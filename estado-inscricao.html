<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estado da Inscricao - USGA</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body class="home-page">

    <header class="header">
        <div class="container header-container">
            <a href="index.html" class="logo">USGA</a>
            <nav class="nav">
                <ul class="nav-list">
                    <li><a href="index.html" class="nav-link">Pagina Inicial</a></li>
                    <li><a href="eventos.html" class="nav-link active">Eventos</a></li>
                    <li><a href="suporte.html" class="nav-link">Suporte</a></li>
                </ul>
            </nav>
            <a href="login.html" class="btn btn-primary">Login</a>
        </div>
    </header>

    <main>
        <section class="hero-bg-slideshow">
            <div class="slideshow-container">
                <div class="slideshow-image"></div>
                <div class="slideshow-image"></div>
                <div class="slideshow-image"></div>
            </div>
            <div class="hero-overlay-dark"></div>

            <div class="container hero-container">
                <div class="hero-content">
                    <span class="subtitle">EVENTOS</span>
                    <h1>Estado da Inscricao</h1>
                    <p>Consulte se a sua inscricao ja foi validada pela organizacao.</p>
                </div>
            </div>
        </section>

        <section class="contact-section">
            <div class="container" style="max-width: 700px;">
                <div class="contact-form">
                    <h2 style="text-align: center; margin-bottom: 30px;">Consultar inscricao</h2>

                    <form id="statusForm">
                        <div class="form-group">
                            <label for="token">Codigo da inscricao</label>
                            <input type="text" id="token" name="token" placeholder="Cole aqui o codigo recebido apos a inscricao">
                        </div>

                        <button type="submit" id="btnConsultar" class="btn btn-primary" style="width: 100%;">Consultar</button>
                    </form>

                    <div id="statusResult" style="margin-top: 30px;"></div>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container copyright">
            <p>&copy; 2026 Associacao USGA. Todos os direitos reservados.</p>
        </div>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
