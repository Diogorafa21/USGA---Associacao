<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estado da Inscricao - USGA</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body class="home-page">

    <header class="header">
        <div class="container header-container">
            <a href="index.html" class="logo">USGA</a>
            <nav class="nav">
                <ul class="nav-list">
                    <li><a href="index.html" class="nav-link">Pagina Inicial</a></li>
                    <li><a href="eventos.html" class="nav-link active">Eventos</a></li>
                    <li><a href="suporte.html" class="nav-link">Suporte</a></li>
                </ul>
            </nav>
            <a href="login.html" class="btn btn-primary">Login</a>
        </div>
    </header>

    <main>
        <section class="hero-bg-slideshow">
            <div class="slideshow-container">
                <div class="slideshow-image"></div>
                <div class="slideshow-image"></div>
                <div class="slideshow-image"></div>
            </div>
            <div class="hero-overlay-dark"></div>

            <div class="container hero-container">
                <div class="hero-content">
                    <span class="subtitle">EVENTOS</span>
                    <h1>Estado da Inscricao</h1>
                    <p>Consulte se a sua inscricao ja foi validada pela organizacao.</p>
                </div>
            </div>
        </section>

        <section class="contact-section">
            <div class="container" style="max-width: 700px;">
                <div class="contact-form">
                    <h2 style="text-align: center; margin-bottom: 30px;">Consultar inscricao</h2>

                    <form id="statusForm">
                        <div class="form-group">
                            <label for="token">Codigo da inscricao</label>
                            <input type="text" id="token" name="token" placeholder="Cole aqui o codigo recebido apos a inscricao">
                        </div>

                        <button type="submit" id="btnConsultar" class="btn btn-primary" style="width: 100%;">Consultar</button>
                    </form>

                    <div id="statusResult" style="margin-top: 30px;"></div>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container copyright">
            <p>&copy; 2026 Associacao USGA. Todos os direitos reservados.</p>
        </div>
    </footer>

    <script src="js/main.js"></script>
    <script type="module">
        import { getEstadoInscricao, formatarData } from './js/supabase.js'

        const params = new URLSearchParams(window.location.search)
        const tokenUrl = params.get('token')

        // Se vier token na URL, preenche e consulta automaticamente
        if (tokenUrl) {
            document.getElementById('token').value = tokenUrl
            consultar(tokenUrl)
        }

        document.getElementById('statusForm').addEventListener('submit', async (e) => {
            e.preventDefault()
            const token = document.getElementById('token').value.trim()
            if (token) consultar(token)
        })

        async function consultar(token) {
            const btn = document.getElementById('btnConsultar')
            const resultado = document.getElementById('statusResult')

            btn.textContent = 'A consultar...'
            btn.disabled = true
            resultado.innerHTML = ''

            const { data, error } = await getEstadoInscricao(token)

            btn.textContent = 'Consultar'
            btn.disabled = false

            if (error || !data) {
                resultado.innerHTML = `
                    <div style="padding: 20px; background: #fee2e2; border: 1px solid #fca5a5; border-radius: 8px; text-align: center; color: #991b1b;">
                        <strong>Código não encontrado.</strong><br>
                        <span style="font-size: 14px;">Verifique o código e tente novamente.</span>
                    </div>`
                return
            }

            const estadoConfig = {
                confirmada: {
                    bg: '#f0fdf4', border: '#86efac', cor: '#166534',
                    icone: '✓', texto: 'Inscrição Confirmada'
                },
                aguardando_pagamento: {
                    bg: '#fffbeb', border: '#fcd34d', cor: '#92400e',
                    icone: '⏳', texto: 'A aguardar pagamento'
                },
                rejeitada: {
                    bg: '#fee2e2', border: '#fca5a5', cor: '#991b1b',
                    icone: '✕', texto: 'Inscrição Rejeitada'
                },
                cancelada: {
                    bg: '#f9f9f9', border: '#e5e5e5', cor: '#666',
                    icone: '—', texto: 'Inscrição Cancelada'
                }
            }

            const pagamentoConfig = {
                pendente:       { cor: '#92400e', texto: 'Pendente' },
                em_validacao:   { cor: '#1d4ed8', texto: 'Em Validação' },
                validado:       { cor: '#166534', texto: 'Validado' },
                rejeitado:      { cor: '#991b1b', texto: 'Rejeitado' }
            }

            const cfg  = estadoConfig[data.estado]        || estadoConfig.aguardando_pagamento
            const pcfg = pagamentoConfig[data.pagamento_estado] || pagamentoConfig.pendente

            resultado.innerHTML = `
                <div style="padding: 25px; background: ${cfg.bg}; border: 1px solid ${cfg.border}; border-radius: 8px; margin-bottom: 20px; text-align: center;">
                    <div style="font-size: 48px; margin-bottom: 10px;">${cfg.icone}</div>
                    <h3 style="color: ${cfg.cor}; margin-bottom: 5px;">${cfg.texto}</h3>
                    <p style="font-size: 14px; color: #666;">${data.evento_titulo}</p>
                </div>

                <div style="background: #fff; border: 1px solid #eee; border-radius: 8px; overflow: hidden;">
                    <div style="display: flex; justify-content: space-between; padding: 14px 20px; border-bottom: 1px solid #f5f5f5;">
                        <span style="color: #888; font-size: 14px;">Nome</span>
                        <span style="font-weight: 700;">${data.nome}</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; padding: 14px 20px; border-bottom: 1px solid #f5f5f5;">
                        <span style="color: #888; font-size: 14px;">Evento</span>
                        <span style="font-weight: 700;">${data.evento_titulo}</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; padding: 14px 20px; border-bottom: 1px solid #f5f5f5;">
                        <span style="color: #888; font-size: 14px;">Data de inscrição</span>
                        <span style="font-weight: 700;">${formatarData(data.data_inscricao)}</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; padding: 14px 20px; border-bottom: 1px solid #f5f5f5;">
                        <span style="color: #888; font-size: 14px;">Pagamento</span>
                        <span style="font-weight: 700; color: ${pcfg.cor};">${pcfg.texto}</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; padding: 14px 20px;">
                        <span style="color: #888; font-size: 14px;">Dorsal</span>
                        <span style="font-weight: 700;">${data.dorsal || 'A atribuir'}</span>
                    </div>
                    ${data.data_confirmacao ? `
                    <div style="display: flex; justify-content: space-between; padding: 14px 20px; border-top: 1px solid #f5f5f5;">
                        <span style="color: #888; font-size: 14px;">Data de confirmação</span>
                        <span style="font-weight: 700; color: #166534;">${formatarData(data.data_confirmacao)}</span>
                    </div>` : ''}
                </div>

                <p style="text-align: center; margin-top: 20px; font-size: 13px; color: #999;">
                    Guarde o seu código de inscrição para consultas futuras.
                </p>`
        }
    </script>
</body>
