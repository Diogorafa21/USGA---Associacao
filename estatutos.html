<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.75">
    <title>Estatutos - USGA</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
</head>

<body class="home-page">

    <header class="header">
        <div class="container header-container">
            <a href="index.html" class="logo">USGA</a>
            <nav class="nav">
                <ul class="nav-list">
                    <li><a href="index.html" class="nav-link">Página Inicial</a></li>
                    <li><a href="eventos.html" class="nav-link">Eventos</a></li>
                    <li><a href="suporte.html" class="nav-link">Suporte</a></li>
                </ul>
            </nav>
            <a href="login.html" class="btn btn-primary">Login</a>
        </div>
    </header>

    <main>
        <section class="hero-bg-slideshow">
            <div class="slideshow-container">
                <div class="slideshow-image"></div>
                <div class="slideshow-image"></div>
                <div class="slideshow-image"></div>
            </div>

            <div class="hero-overlay-dark"></div>

            <div class="container hero-container">
                <div class="hero-content">
                    <span class="subtitle">DOCUMENTOS OFICIAIS</span>
                    <h1>Estatutos da Associação</h1>
                    <p>Consulta reservada a sócios com sessão iniciada.</p>
                </div>
            </div>
        </section>

        <section class="contact-section">
            <div class="container" style="max-width: 640px; text-align: center;">
                <div id="estatutosEstado" class="contact-form" style="text-align:left;">
                    <p style="color:#666;">A verificar o seu acesso...</p>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container copyright">
            <p>&copy; 2026 Associação USGA. Todos os direitos reservados.</p>
        </div>
    </footer>

    <script src="js/main.js"></script>
    <script type="module">
        import { getSessao, getPerfil, getConfiguracao } from './js/supabase.js'

        const estadoBox = document.getElementById('estatutosEstado')

        function mostrar(html) {
            estadoBox.innerHTML = html
        }

        const sessao = await getSessao()

        // 1) Sem sessão: pede login e volta aqui a seguir.
        if (!sessao) {
            mostrar('<p style="color:#666;">Precisa de iniciar sessão para ver os estatutos. A redirecionar para o login...</p>')
            window.location.href = 'login.html?redirect=estatutos.html'
            throw new Error('redirecionando para login')
        }

        const { data: perfil } = await getPerfil(sessao.user.id)
        const socioAtivo = !!(perfil && perfil.numero_socio && perfil.estado === 'ativo')

        // 2) Tem sessão mas não é sócio ativo: encaminha para o registo de sócio.
        if (!socioAtivo) {
            mostrar('<p style="color:#666;">Os estatutos só estão disponíveis para sócios ativos. A encaminhar para o registo de sócio...</p>')
            window.location.href = 'registo-socio.html?motivo=estatutos'
            throw new Error('redirecionando para registo de socio')
        }

        // 3) Sócio ativo confirmado: mostra o documento (se já tiver sido carregado).
        const { data: url } = await getConfiguracao('estatutos_pdf_url')

        if (url) {
            mostrar(`
                <h3 style="margin-bottom:15px;">Estatutos da USGA</h3>
                <p style="color:#666;margin-bottom:20px;">Acesso confirmado como sócio ativo. Pode consultar o documento oficial abaixo.</p>
                <a href="${url}" target="_blank" rel="noopener" class="btn btn-primary">📄 Abrir Estatutos (PDF)</a>
            `)
        } else {
            mostrar(`
                <h3 style="margin-bottom:15px;">Estatutos da USGA</h3>
                <p style="color:#666;">O documento ainda não foi carregado pela direção. Volte a consultar brevemente.</p>
            `)
        }
    </script>
</body>
</html>
