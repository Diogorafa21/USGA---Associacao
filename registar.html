<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.75">
    <title>Criar Conta - USGA</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body class="home-page">

    <header class="header">
        <div class="container header-container">
            <a href="index.html" class="logo">USGA</a>
            <nav class="nav">
                <ul class="nav-list">
                    <li><a href="index.html" class="nav-link">Página Inicial</a></li>
                    <li><a href="eventos.html" class="nav-link">Eventos</a></li>
                    <li><a href="suporte.html" class="nav-link">Suporte</a></li>
                </ul>
            </nav>
            <a href="login.html" class="btn btn-primary">Login</a>
        </div>
    </header>

    <main>
        <section class="hero-bg-slideshow">
            <div class="slideshow-container">
                <div class="slideshow-image"></div>
                <div class="slideshow-image"></div>
                <div class="slideshow-image"></div>
            </div>
            <div class="hero-overlay-dark"></div>
            <div class="container hero-container">
                <div class="hero-content">
                    <span class="subtitle">ACESSO DIGITAL</span>
                    <h1>Criar Conta</h1>
                    <p>Crie o seu perfil digital para gerir as suas atividades.</p>
                </div>
            </div>
        </section>

        <section class="contact-section">
            <div class="container" style="max-width: 600px;">
                <div class="contact-form">
                    <h2 style="text-align: center; margin-bottom: 30px;">Dados de Acesso</h2>

                    <!-- Mensagem de feedback -->
                    <div id="mensagem" style="display:none; padding: 12px 16px; border-radius: 8px; margin-bottom: 20px; font-size: 14px;"></div>
                    
                    <form id="registerForm">
                        <div class="form-grid">
                            <div class="form-group">
                                <label for="nome">Nome Próprio</label>
                                <input type="text" id="nome" name="nome" required>
                            </div>
                            <div class="form-group">
                                <label for="apelido">Apelido</label>
                                <input type="text" id="apelido" name="apelido" required>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" name="email" required>
                        </div>

                        <div class="form-grid">
                            <div class="form-group">
                                <label for="pass">Password</label>
                                <input type="password" id="pass" name="pass" required>
                            </div>
                            <div class="form-group">
                                <label for="confirm-pass">Confirmar Password</label>
                                <input type="password" id="confirm-pass" name="confirm-pass" required>
                            </div>
                        </div>
                        
                        <div class="form-group">
                             <label style="display: flex; align-items: start; gap: 10px; font-weight: 400; font-size: 14px;">
                                <input type="checkbox" style="width: auto; margin-top: 4px;" required>
                                Aceito os termos e condições.
                            </label>
                        </div>

                        <button type="submit" id="btnRegistar" class="btn btn-primary" style="width: 100%;">Criar Conta</button>
                    </form>
                    
                    <p style="text-align: center; margin-top: 20px; font-size: 14px;">
                        Já tem conta? <a href="login.html" style="color: var(--accent-color); font-weight: 700;">Faça Login</a>.
                    </p>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container copyright">
            <p>&copy; 2026 Associação USGA. Todos os direitos reservados.</p>
        </div>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
